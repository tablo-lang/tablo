name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind cmake

    - name: Build with sanitizers
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug -DUSE_SANITIZERS=ON ..
        cmake --build . --config Debug

    - name: Run tests with sanitizers
      run: |
        cd build
        ASAN_OPTIONS=detect_leaks=0:allocator_may_return_null=1 ctest --test-dir . --output-on-failure

    - name: Upload TabloLang CLI JUnit (sanitizers)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tablo-cli-junit-sanitizers
        path: build/tablo_tests.junit.xml
        if-no-files-found: ignore

    - name: Build Valgrind target
      run: |
        cmake -S . -B build-valgrind -DCMAKE_BUILD_TYPE=Debug
        cmake --build build-valgrind --config Debug --target memory_safety_tests test_vm_direct

    - name: Run Valgrind
      run: |
        cd build-valgrind
        valgrind --leak-check=full --error-exitcode=1 --show-leak-kinds=all ./memory_safety_tests
        valgrind --leak-check=full --error-exitcode=1 --show-leak-kinds=all ./test_vm_direct

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake

    - name: Configure fuzz targets
      run: |
        cmake -S . -B build-fuzz -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DENABLE_FUZZING=ON -DUSE_SANITIZERS=ON

    - name: Build fuzz targets
      run: |
        cmake --build build-fuzz --target fuzz_lexer fuzz_parser fuzz_compile fuzz_http fuzz_artifact --config Debug

    - name: Run fuzz smoke tests
      run: |
        ./build-fuzz/fuzz_lexer -runs=2000 -max_total_time=20 tests/fuzz/corpus/lexer
        ./build-fuzz/fuzz_parser -runs=2000 -max_total_time=20 tests/fuzz/corpus/parser
        ./build-fuzz/fuzz_compile -runs=2000 -max_total_time=20 tests/fuzz/corpus/compile
        ./build-fuzz/fuzz_http -runs=2000 -max_total_time=20 tests/fuzz/corpus/http
        ./build-fuzz/fuzz_artifact -runs=2000 -max_total_time=20 tests/fuzz/corpus/artifact

  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ..

    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }}

    - name: Verify Linux build hardening (Release)
      if: matrix.os == 'ubuntu-latest' && matrix.build_type == 'Release'
      run: |
        python3 tools/check_build_hardening.py --build-dir build --config Release --target tablo

    - name: Run tests
      run: |
        cd build
        ctest --test-dir . -C ${{ matrix.build_type }} --output-on-failure

    - name: Upload TabloLang CLI JUnit
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tablo-cli-junit-${{ matrix.os }}-${{ matrix.build_type }}
        path: build/tablo_tests.junit.xml
        if-no-files-found: ignore
